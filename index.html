<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Vistoria de Veículos</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#0F6E56;--green-light:#E1F5EE;--green-mid:#1D9E75;
  --red:#E24B4A;--red-light:#FCEBEB;
  --gray:#6b7280;--border:#e5e7eb;--bg:#f9fafb;
  --white:#ffffff;--text:#111827;--text-muted:#6b7280;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:15px;min-height:100vh}
input,select,textarea,button{font-family:inherit;font-size:15px}

/* ---- AUTH ---- */
#authScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1rem}
.auth-card{background:var(--white);border-radius:16px;border:1px solid var(--border);padding:2rem;width:100%;max-width:360px}
.auth-logo{text-align:center;margin-bottom:1.5rem}
.auth-logo .icon{width:48px;height:48px;background:var(--green);border-radius:12px;display:inline-flex;align-items:center;justify-content:center;margin-bottom:.5rem}
.auth-logo .icon svg{width:26px;height:26px}
.auth-logo h1{font-size:20px;font-weight:600;color:var(--text)}
.auth-logo p{font-size:13px;color:var(--text-muted);margin-top:2px}
.field{margin-bottom:14px}
.field label{display:block;font-size:13px;color:var(--text-muted);margin-bottom:5px}
.field input{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:15px;background:var(--white);color:var(--text);outline:none;transition:border-color .15s}
.field input:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(15,110,86,.1)}
.btn-primary{width:100%;padding:11px;background:var(--green);color:white;border:none;border-radius:8px;font-size:15px;font-weight:500;cursor:pointer;transition:background .15s}
.btn-primary:hover{background:#085041}
.btn-primary:disabled{background:#9ca3af;cursor:default}
.err{color:var(--red);font-size:13px;margin-top:8px;text-align:center}

/* ---- APP LAYOUT ---- */
#app{display:none;min-height:100vh;flex-direction:column}
.topbar{background:var(--green);padding:14px 16px;display:flex;align-items:center;justify-content:space-between}
.topbar-left{display:flex;align-items:center;gap:10px}
.topbar-left .logo-icon{width:32px;height:32px;background:rgba(255,255,255,.15);border-radius:8px;display:flex;align-items:center;justify-content:center}
.topbar-left .logo-icon svg{width:18px;height:18px}
.topbar-title{color:white;font-size:15px;font-weight:500}
.topbar-sub{color:rgba(255,255,255,.7);font-size:12px}
.topbar-right{display:flex;align-items:center;gap:8px}
.badge-perfil{background:rgba(255,255,255,.15);color:white;font-size:11px;padding:3px 10px;border-radius:20px}
.btn-logout{background:none;border:none;color:rgba(255,255,255,.7);cursor:pointer;font-size:13px;padding:4px 8px}

/* ---- TABS ---- */
.tabs{background:var(--white);border-bottom:1px solid var(--border);display:flex}
.tab{flex:1;padding:12px 8px;text-align:center;font-size:13px;color:var(--text-muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.tab.active{color:var(--green);border-bottom-color:var(--green);font-weight:500}
.tab-icon{display:block;font-size:18px;margin-bottom:2px}

/* ---- PAINEL GERENCIAL ---- */
#painelScreen{display:none;padding:16px;max-width:800px;margin:0 auto;width:100%}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.stat-card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center}
.stat-num{font-size:24px;font-weight:600;color:var(--green)}
.stat-label{font-size:12px;color:var(--text-muted);margin-top:2px}
.section-title{font-size:14px;font-weight:500;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.vistoria-card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px;cursor:pointer;transition:border-color .15s}
.vistoria-card:hover{border-color:var(--green-mid)}
.vc-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.vc-codigo{font-weight:500;font-size:15px}
.vc-status{font-size:11px;padding:3px 8px;border-radius:12px}
.vc-status.concluida{background:var(--green-light);color:var(--green)}
.vc-status.em_andamento{background:#FEF3C7;color:#92400E}
.vc-info{font-size:13px;color:var(--text-muted);display:flex;gap:12px;flex-wrap:wrap}
.vc-badges{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.mini-badge{font-size:11px;padding:2px 8px;border-radius:8px;background:var(--bg)}
.mini-badge.nok{background:var(--red-light);color:var(--red)}
.btn-nova{background:var(--green);color:white;border:none;border-radius:10px;padding:12px 20px;font-size:14px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:6px;margin-bottom:16px;width:100%;justify-content:center}

/* ---- CHECKLIST STEPS ---- */
#checklistScreen{display:none;max-width:480px;margin:0 auto;width:100%}
.step-progress{padding:12px 16px;background:var(--white);border-bottom:1px solid var(--border)}
.progress-dots{display:flex;gap:4px;margin-bottom:6px}
.pdot{flex:1;height:4px;border-radius:2px;background:var(--border)}
.pdot.done{background:var(--green-mid)}
.pdot.active{background:var(--green)}
.step-label{font-size:12px;color:var(--text-muted)}
.step-body{padding:16px}
.sec-card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:12px}
.sec-head{display:flex;align-items:center;gap:8px;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.sec-head-icon{width:28px;height:28px;background:var(--green-light);border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sec-head-icon svg{width:15px;height:15px}
.sec-head-title{font-size:14px;font-weight:500;color:var(--green)}
.flabel{display:block;font-size:12px;color:var(--text-muted);margin-bottom:4px}
.req{color:var(--red)}
input[type=text].fi,input[type=date].fi,input[type=time].fi,input[type=number].fi,select.fi{
  width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:8px;font-size:14px;
  background:var(--white);color:var(--text);outline:none;-webkit-appearance:none;appearance:none;
}
input.fi:focus,select.fi:focus{border-color:var(--green);box-shadow:0 0 0 2px rgba(15,110,86,.1)}
textarea.fi{width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:8px;font-size:14px;resize:vertical;min-height:70px;background:var(--white);color:var(--text);outline:none}
textarea.fi:focus{border-color:var(--green);box-shadow:0 0 0 2px rgba(15,110,86,.1)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.mb12{margin-bottom:12px}
.check-row{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border:1px solid var(--border);border-radius:8px;margin-bottom:8px}
.check-name{font-size:14px;flex:1;margin-right:8px}
.check-name small{display:block;font-size:11px;color:var(--text-muted)}
.status-btns{display:flex;gap:4px}
.sb{width:34px;height:34px;border-radius:7px;border:1px solid var(--border);background:transparent;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all .12s;font-weight:500}
.sb.ok.sel{background:var(--green-light);border-color:var(--green-mid);color:var(--green)}
.sb.nok.sel{background:var(--red-light);border-color:var(--red);color:var(--red)}
.sb.na.sel{background:#f3f4f6;border-color:#9ca3af;color:#6b7280}
.cat-title{font-size:12px;font-weight:500;color:var(--text-muted);text-transform:uppercase;letter-spacing:.4px;margin:12px 0 6px}
.photo-zone{border:1px dashed var(--border);border-radius:10px;padding:12px;margin-bottom:12px}
.pz-label{font-size:12px;color:var(--text-muted);margin-bottom:8px}
.photo-grid{display:flex;gap:8px;flex-wrap:wrap}
.photo-thumb{width:72px;height:72px;border-radius:8px;overflow:hidden;position:relative;border:1px solid var(--border)}
.photo-thumb img{width:100%;height:100%;object-fit:cover}
.photo-del{position:absolute;top:2px;right:2px;width:18px;height:18px;background:rgba(226,75,74,.9);border-radius:50%;border:none;color:white;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
.photo-add-btn{width:72px;height:72px;border-radius:8px;border:1px dashed var(--border);background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;gap:3px;color:var(--text-muted)}
.photo-add-btn svg{width:20px;height:20px}
.photo-add-btn span{font-size:10px}
input[type=file]{display:none}
.sign-wrap{border:1px solid var(--border);border-radius:10px;background:var(--bg);position:relative;margin-top:6px}
canvas.sig{display:block;width:100%;height:130px;cursor:crosshair;touch-action:none;border-radius:10px}
.sig-line{position:absolute;bottom:28px;left:8%;right:8%;height:1px;background:var(--border);pointer-events:none}
.sig-hint{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);font-size:10px;color:var(--text-muted);white-space:nowrap;pointer-events:none}
.btn-row{display:flex;gap:8px;margin-top:10px}
.btn-back{padding:10px 16px;border:1px solid var(--border);border-radius:8px;font-size:14px;cursor:pointer;background:var(--white);color:var(--text-muted)}
.btn-next{flex:1;padding:10px;background:var(--green);color:white;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer}
.btn-next:disabled{background:#9ca3af}
.accept-box{display:flex;align-items:flex-start;gap:10px;padding:12px;background:var(--bg);border-radius:8px;margin-bottom:12px}
.accept-box input{width:16px;height:16px;flex-shrink:0;margin-top:1px;accent-color:var(--green)}
.accept-box label{font-size:13px;color:var(--text-muted)}
.nivel-btns{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.nv-btn{padding:5px 12px;border:1px solid var(--border);border-radius:20px;font-size:12px;cursor:pointer;background:transparent;color:var(--text);transition:all .12s}
.nv-btn.sel{background:var(--green-light);border-color:var(--green-mid);color:var(--green)}
.success-box{background:var(--green-light);border:1px solid var(--green-mid);border-radius:12px;padding:20px;text-align:center;margin-top:16px}
.success-box .ok-icon{width:44px;height:44px;background:var(--green-mid);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 10px}
.success-box h3{font-size:16px;font-weight:500;color:var(--green);margin-bottom:4px}
.success-box p{font-size:13px;color:var(--green-mid)}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1f2937;color:white;padding:10px 20px;border-radius:20px;font-size:13px;z-index:999;display:none;white-space:nowrap}
/* Modal detalhes vistoria */
#modalVistoria{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.5);padding:1rem;align-items:flex-start;justify-content:center;overflow-y:auto}
#modalVistoria.open{display:flex}
.modal-card{background:var(--white);border-radius:16px;width:100%;max-width:600px;margin:auto;overflow:hidden}
.modal-header{background:var(--green);padding:16px;display:flex;justify-content:space-between;align-items:center}
.modal-header h2{color:white;font-size:16px;font-weight:500}
.modal-close{background:none;border:none;color:white;font-size:20px;cursor:pointer;line-height:1}
.modal-body{padding:16px;overflow-y:auto;max-height:80vh}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.detail-item label{font-size:11px;color:var(--text-muted);display:block}
.detail-item span{font-size:14px;font-weight:500}
.fotos-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px}
.fotos-grid img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:8px;border:1px solid var(--border)}
.items-list{margin-top:8px}
.item-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.item-row:last-child{border:none}
@media(max-width:400px){.stats-grid{grid-template-columns:1fr 1fr}.detail-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<!-- TELA DE LOGIN -->
<div id="authScreen">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="icon">
        <svg viewBox="0 0 26 26" fill="none"><rect x="3" y="3" width="20" height="20" rx="4" stroke="white" stroke-width="1.5"/><path d="M8 13l3 3 7-7" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <h1>Vistoria de Veículos</h1>
      <p>Acesse com seu e-mail corporativo</p>
    </div>
    <div class="field"><label>E-mail</label><input type="email" id="loginEmail" placeholder="seu@empresa.com.br"/></div>
    <div class="field"><label>Senha</label><input type="password" id="loginSenha" placeholder="••••••••"/></div>
    <button class="btn-primary" id="btnLogin" onclick="fazerLogin()">Entrar</button>
    <div class="err" id="loginErr"></div>
  </div>
</div>

<!-- APP PRINCIPAL -->
<div id="app" style="display:flex">
  <div class="topbar">
    <div class="topbar-left">
      <div class="logo-icon">
        <svg viewBox="0 0 18 18" fill="none"><rect x="1" y="1" width="16" height="16" rx="3" stroke="white" stroke-width="1.2"/><path d="M5 9l3 3 5-5" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div>
        <div class="topbar-title">Vistoria</div>
        <div class="topbar-sub" id="topSub">Carregando...</div>
      </div>
    </div>
    <div class="topbar-right">
      <span class="badge-perfil" id="badgePerfil">--</span>
      <button class="btn-logout" onclick="fazerLogout()">Sair</button>
    </div>
  </div>

  <div class="tabs" id="tabsBar">
    <div class="tab active" id="tabChecklist" onclick="showTab('checklist')">
      <span class="tab-icon">📋</span>Nova vistoria
    </div>
    <div class="tab" id="tabPainel" onclick="showTab('painel')">
      <span class="tab-icon">📊</span>Painel
    </div>
  </div>

  <!-- CHECKLIST -->
  <div id="checklistScreen" style="display:block">
    <div class="step-progress">
      <div class="progress-dots">
        <div class="pdot active" id="pd0"></div>
        <div class="pdot" id="pd1"></div>
        <div class="pdot" id="pd2"></div>
        <div class="pdot" id="pd3"></div>
        <div class="pdot" id="pd4"></div>
      </div>
      <div class="step-label" id="stepLabel">Passo 1 de 5 — Identificação</div>
    </div>
    <div id="stepContent" class="step-body"></div>
  </div>

  <!-- PAINEL -->
  <div id="painelScreen">
    <div class="stats-grid" id="statsGrid">
      <div class="stat-card"><div class="stat-num" id="stTotal">-</div><div class="stat-label">Total</div></div>
      <div class="stat-card"><div class="stat-num" id="stMes">-</div><div class="stat-label">Este mês</div></div>
      <div class="stat-card"><div class="stat-num" id="stNok">-</div><div class="stat-label">Com danos</div></div>
    </div>
    <button class="btn-nova" onclick="showTab('checklist');currentStep=0;renderStep()">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 3v10M3 8h10" stroke="white" stroke-width="2" stroke-linecap="round"/></svg>
      Nova vistoria
    </button>
    <div class="section-title">Vistorias recentes</div>
    <div id="listaVistorias"><div style="text-align:center;padding:2rem;color:var(--text-muted);font-size:13px">Carregando...</div></div>
  </div>
</div>

<!-- MODAL DETALHES -->
<div id="modalVistoria">
  <div class="modal-card">
    <div class="modal-header">
      <h2 id="modalTitle">Vistoria</h2>
      <button class="modal-close" onclick="fecharModal()">×</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// CONFIGURAÇÃO — TROQUE PELOS SEUS VALORES DO SUPABASE
// ============================================================
const SUPABASE_URL = 'https://zuizoheucqryliflgrxk.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_zMJhjIjHk9pOUeoA2pI_rw_EwCeARba';
// ============================================================

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let usuarioAtual = null;
let perfilAtual = null;
let currentStep = 0;
let photos = {};
let statuses = {};
let nivelComb = 'Cheio';
let hasSigV = false, hasSigC = false;

const ITEMS_CHECKLIST = [
  {cat:'Documentos',items:[{n:'CRLV / Documento do veículo'},{n:'Manual do proprietário'},{n:'Chave reserva'},{n:'Laudo de vistoria anterior'}]},
  {cat:'Pneus e rodas',items:[{n:'Pneu dianteiro esquerdo',s:'calibragem e estado'},{n:'Pneu dianteiro direito',s:'calibragem e estado'},{n:'Pneu traseiro esquerdo',s:'calibragem e estado'},{n:'Pneu traseiro direito',s:'calibragem e estado'},{n:'Estepe',s:'presença e calibragem'},{n:'Macaco e chave de roda'}]},
  {cat:'Interior',items:[{n:'Banco dianteiro esquerdo'},{n:'Banco dianteiro direito'},{n:'Banco traseiro'},{n:'Cintos de segurança'},{n:'Painel / instrumentos'},{n:'Ar condicionado'},{n:'Rádio / multimídia'},{n:'Tapetes'},{n:'Espelho retrovisor interno'}]},
  {cat:'Elétrica e mecânica',items:[{n:'Faróis dianteiros'},{n:'Lanternas traseiras'},{n:'Luz de freio'},{n:'Sinaleiras / piscas'},{n:'Luz de ré'},{n:'Buzina'},{n:'Limpadores de para-brisa'},{n:'Bateria'}]},
  {cat:'Equipamentos obrigatórios',items:[{n:'Triângulo de sinalização'},{n:'Extintor de incêndio',s:'validade vigente'},{n:'Macaco hidráulico'},{n:'Chave de roda'},{n:'Colete refletivo'}]}
];

const AREAS_CARROCERIA = ['Para-choque dianteiro','Capô','Para-brisa dianteiro','Teto','Porta dianteira esq.','Porta dianteira dir.','Porta traseira esq.','Porta traseira dir.','Lateral esquerda','Lateral direita','Para-lama dianteiro esq.','Para-lama dianteiro dir.','Para-choque traseiro','Vidro traseiro'];

const FOTO_SECS = [
  {id:'frente',label:'Frente',req:true},{id:'traseira',label:'Traseira',req:true},
  {id:'lateral_esq',label:'Lateral esquerda',req:true},{id:'lateral_dir',label:'Lateral direita',req:true},
  {id:'painel',label:'Painel / hodômetro',req:true},{id:'interior',label:'Interior',req:false},
  {id:'avarias',label:'Avarias / danos',req:false},{id:'extras',label:'Fotos extras',req:false}
];

// ---- AUTH ----
async function fazerLogin(){
  const email = document.getElementById('loginEmail').value.trim();
  const senha = document.getElementById('loginSenha').value;
  document.getElementById('loginErr').textContent='';
  document.getElementById('btnLogin').disabled=true;
  document.getElementById('btnLogin').textContent='Entrando...';
  const {data,error} = await sb.auth.signInWithPassword({email,password:senha});
  if(error){
    document.getElementById('loginErr').textContent='E-mail ou senha incorretos.';
    document.getElementById('btnLogin').disabled=false;
    document.getElementById('btnLogin').textContent='Entrar';
    return;
  }
  await initApp(data.user);
}

async function initApp(user){
  usuarioAtual = user;
  const {data} = await sb.from('usuarios').select('*').eq('email',user.email).single();
  perfilAtual = data;
  document.getElementById('authScreen').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('topSub').textContent = perfilAtual?.nome || user.email;
  document.getElementById('badgePerfil').textContent = perfilAtual?.perfil || 'usuário';
  if(perfilAtual?.perfil === 'vistoriador'){
    document.getElementById('tabPainel').style.display='none';
  }
  initFotos();
  renderStep();
}

async function fazerLogout(){
  await sb.auth.signOut();
  location.reload();
}

sb.auth.onAuthStateChange((event,session)=>{
  if(session?.user) initApp(session.user);
});

// ---- TABS ----
function showTab(tab){
  document.getElementById('checklistScreen').style.display = tab==='checklist'?'block':'none';
  document.getElementById('painelScreen').style.display = tab==='painel'?'block':'none';
  document.getElementById('tabChecklist').className = 'tab'+(tab==='checklist'?' active':'');
  document.getElementById('tabPainel').className = 'tab'+(tab==='painel'?' active':'');
  if(tab==='painel') carregarPainel();
}

// ---- PAINEL ----
async function carregarPainel(){
  const {data:vis} = await sb.from('vw_vistorias_completas').select('*').order('criado_em',{ascending:false}).limit(50);
  if(!vis){return;}
  const hoje = new Date();
  const mesAtual = vis.filter(v=>{
    const d = new Date(v.data_vistoria);
    return d.getMonth()===hoje.getMonth()&&d.getFullYear()===hoje.getFullYear();
  });
  const comDanos = vis.filter(v=>v.total_nok>0);
  document.getElementById('stTotal').textContent = vis.length;
  document.getElementById('stMes').textContent = mesAtual.length;
  document.getElementById('stNok').textContent = comDanos.length;
  const lista = document.getElementById('listaVistorias');

function setupSig(cid,hk){
  const canvas=document.getElementById(cid);
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  let drawing=false;
  function resize(){const r=canvas.getBoundingClientRect(),dpr=window.devicePixelRatio||1;canvas.width=r.width*dpr;canvas.height=r.height*dpr;ctx.scale(dpr,dpr);ctx.strokeStyle='#0F6E56';ctx.lineWidth=2;ctx.lineCap='round';ctx.lineJoin='round';}
  resize();
  function pos(e){const r=canvas.getBoundingClientRect(),s=e.touches?e.touches[0]:e;return{x:s.clientX-r.left,y:s.clientY-r.top};}
  canvas.addEventListener('mousedown',e=>{drawing=true;const p=pos(e);ctx.beginPath();ctx.moveTo(p.x,p.y);});
  canvas.addEventListener('mousemove',e=>{if(!drawing)return;window[hk]=true;const p=pos(e);ctx.lineTo(p.x,p.y);ctx.stroke();});
  canvas.addEventListener('mouseup',()=>drawing=false);
  canvas.addEventListener('touchstart',e=>{e.preventDefault();drawing=true;const p=pos(e);ctx.beginPath();ctx.moveTo(p.x,p.y);},{passive:false});
  canvas.addEventListener('touchmove',e=>{e.preventDefault();if(!drawing)return;window[hk]=true;const p=pos(e);ctx.lineTo(p.x,p.y);ctx.stroke();},{passive:false});
  canvas.addEventListener('touchend',()=>drawing=false);
}
function limparSig(cid,hk){const c=document.getElementById(cid);if(c)c.getContext('2d').clearRect(0,0,c.width,c.height);window[hk]=false;}

async function salvarVistoria(){
  if(!document.getElementById('aceite').checked){showToast('Marque a confirmação.');return;}
  if(!window.hasSigV){showToast('Assinatura do vistoriador obrigatória.');return;}
  if(!window.hasSigC){showToast('Assinatura do cliente obrigatória.');return;}
  const btn=document.getElementById('btnSalvar');
  btn.disabled=true;btn.textContent='Salvando...';

  try{
    // 1. Criar ou buscar veículo
    const placa=document.getElementById('f_placa').value.trim().toUpperCase();
    let veiculoId=null;
    const {data:vexist}=await sb.from('veiculos').select('id').eq('placa',placa).single();
    if(vexist){veiculoId=vexist.id;}else{
      const {data:vnew}=await sb.from('veiculos').insert({placa,marca:document.getElementById('f_modelo').value,modelo:document.getElementById('f_modelo').value,ano:document.getElementById('f_ano')?.value,cor:document.getElementById('f_cor')?.value,combustivel:document.getElementById('f_comb').value}).select('id').single();
      veiculoId=vnew?.id;
    }
    // 2. Criar ou buscar cliente
    const nomeCliente=document.getElementById('f_cliente').value.trim();
    let clienteId=null;
    const {data:clexist}=await sb.from('clientes').select('id').eq('nome',nomeCliente).single();
    if(clexist){clienteId=clexist.id;}else{
      const {data:clnew}=await sb.from('clientes').insert({nome:nomeCliente,documento:document.getElementById('f_doc').value,telefone:document.getElementById('f_fone').value}).select('id').single();
      clienteId=clnew?.id;
    }
    // 3. Assinaturas base64
    const sigVC=document.getElementById('sigV').toDataURL('image/png');
    const sigCC=document.getElementById('sigC').toDataURL('image/png');

    // 4. Criar vistoria
    const {data:vis,error:visErr}=await sb.from('vistorias').insert({
      tipo:document.getElementById('f_tipo').value,
      veiculo_id:veiculoId,
      cliente_id:clienteId,
      vistoriador_id:perfilAtual?.id,
      km_atual:parseInt(document.getElementById('f_km').value)||null,
      nivel_combustivel:nivelComb,
      numero_contrato:document.getElementById('f_contrato').value,
      observacoes:document.getElementById('f_obs')?.value,
      cidade_assinatura:document.getElementById('f_cidade').value,
      data_vistoria:document.getElementById('f_data').value,
      hora_vistoria:document.getElementById('f_hora').value,
      assinatura_vistoriador:sigVC,
      assinatura_cliente:sigCC,
      status:'concluida',
      finalizado_em:new Date().toISOString()
    }).select('id,codigo').single();

    if(visErr) throw visErr;
    const visId=vis.id;

    // 5. Salvar itens
    const itensPayload=[];
    ITEMS_CHECKLIST.forEach(g=>{
      g.items.forEach((it,i)=>{
        const id=`${g.cat}_${i}`;
        itensPayload.push({vistoria_id:visId,categoria:g.cat,item:it.n,status:statuses[id]||'na'});
      });
    });
    AREAS_CARROCERIA.forEach((a,i)=>{
      const id=`carroceria_${i}`;
      itensPayload.push({vistoria_id:visId,categoria:'Carroceria',item:a,status:statuses[id]||'na'});
    });
    await sb.from('itens_vistoria').insert(itensPayload);

    // 6. Upload fotos para Supabase Storage
    let totalFotos=0;
    for(const sec of FOTO_SECS){
      for(const p of (photos[sec.id]||[])){
        const path=`vistorias/${visId}/${sec.id}_${Date.now()}.jpg`;
        const {data:upData}=await sb.storage.from('fotos-vistorias').upload(path,p.file,{contentType:'image/jpeg',upsert:true});
        if(upData){
          const {data:url}=sb.storage.from('fotos-vistorias').getPublicUrl(path);
          await sb.from('fotos_vistoria').insert({vistoria_id:visId,secao:sec.id,nome_arquivo:path,url_publica:url?.publicUrl,tamanho_bytes:p.file.size});
          totalFotos++;
        }
      }
    }

    // 7. Sucesso!
    document.getElementById('successBox').style.display='block';
    document.getElementById('successBox').innerHTML=`<div class="success-box">
      <div class="ok-icon"><svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M4 11l5 5 9-9" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <h3>Vistoria salva!</h3>
      <p>ID: <strong>${vis.codigo}</strong><br>${totalFotos} foto(s) enviada(s)<br>Pasta: vistorias/${visId}/</p>
    </div>`;
    btn.style.display='none';
    // Reset para nova vistoria
    setTimeout(()=>{statuses={};photos={};initFotos();nivelComb='Cheio';currentStep=0;renderStep();},5000);

  }catch(e){
    console.error(e);
    showToast('Erro ao salvar. Tente novamente.');
    btn.disabled=false;btn.textContent='Finalizar e salvar';
  }
}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';setTimeout(()=>t.style.display='none',2500);}

sb.auth.getSession().then(({data:{session}})=>{
  if(!session){document.getElementById('authScreen').style.display='flex';document.getElementById('app').style.display='none';}
});
</script>
