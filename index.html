<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Betiolo Aluguel de Frotas — Vistoria</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--brand:#C0392B;--brand-dark:#922B21;--brand-light:#FADBD8;--brand-mid:#E74C3C;--border:#e5e7eb;--bg:#f9fafb;--white:#fff;--text:#111827;--text-muted:#6b7280;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:15px;min-height:100vh}
input,select,textarea,button{font-family:inherit;font-size:15px}
#authScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1rem;background:var(--brand)}
.auth-card{background:var(--white);border-radius:20px;padding:2rem;width:100%;max-width:340px;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.auth-logo{text-align:center;margin-bottom:1.5rem}
.auth-logo img{width:88px;height:88px;border-radius:16px;margin-bottom:.5rem}
.auth-logo h1{font-size:17px;font-weight:700;color:var(--text)}
.auth-logo p{font-size:12px;color:var(--text-muted);margin-top:2px}
.field{margin-bottom:13px}
.field label{display:block;font-size:12px;color:var(--text-muted);margin-bottom:4px;font-weight:500}
.field input{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:9px;font-size:15px;background:var(--white);color:var(--text);outline:none}
.field input:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(192,57,43,.1)}
.btn-primary{width:100%;padding:12px;background:var(--brand);color:white;border:none;border-radius:9px;font-size:15px;font-weight:700;cursor:pointer}
.btn-primary:hover{background:var(--brand-dark)}
.btn-primary:disabled{background:#9ca3af;cursor:default}
.err{color:var(--brand-dark);font-size:13px;margin-top:8px;text-align:center}
#app{display:none;min-height:100vh;flex-direction:column}
.topbar{background:var(--brand);padding:10px 14px;display:flex;align-items:center;justify-content:space-between}
.topbar-left{display:flex;align-items:center;gap:10px}
.topbar-logo{width:36px;height:36px;border-radius:8px;object-fit:cover}
.topbar-title{color:white;font-size:13px;font-weight:700}
.topbar-sub{color:rgba(255,255,255,.75);font-size:11px}
.topbar-right{display:flex;align-items:center;gap:6px}
.badge-perfil{background:rgba(255,255,255,.18);color:white;font-size:11px;padding:3px 9px;border-radius:20px}
.btn-logout{background:none;border:none;color:rgba(255,255,255,.7);cursor:pointer;font-size:12px;padding:4px 8px}
.tabs{background:var(--white);border-bottom:1px solid var(--border);display:flex}
.tab{flex:1;padding:11px 8px;text-align:center;font-size:13px;color:var(--text-muted);cursor:pointer;border-bottom:2px solid transparent}
.tab.active{color:var(--brand);border-bottom-color:var(--brand);font-weight:600}
.tab-icon{display:block;font-size:17px;margin-bottom:2px}
#painelScreen{display:none;padding:14px;max-width:800px;margin:0 auto;width:100%}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.stat-card{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center}
.stat-num{font-size:22px;font-weight:700;color:var(--brand)}
.stat-label{font-size:11px;color:var(--text-muted);margin-top:2px}
.vistoria-card{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:13px;margin-bottom:8px;cursor:pointer}
.vistoria-card:hover{border-color:var(--brand-mid)}
.vc-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.vc-codigo{font-weight:700;font-size:14px}
.vc-status{font-size:11px;padding:2px 8px;border-radius:10px}
.vc-status.concluida{background:var(--brand-light);color:var(--brand)}
.vc-status.em_andamento{background:#FEF3C7;color:#92400E}
.vc-info{font-size:12px;color:var(--text-muted);display:flex;gap:10px;flex-wrap:wrap}
.vc-badges{display:flex;gap:5px;margin-top:7px;flex-wrap:wrap}
.mini-badge{font-size:11px;padding:2px 7px;border-radius:6px;background:var(--bg)}
.mini-badge.avaria{background:var(--brand-light);color:var(--brand)}
.btn-nova{background:var(--brand);color:white;border:none;border-radius:9px;padding:11px 18px;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;margin-bottom:14px;width:100%;justify-content:center}
#checklistScreen{display:none;max-width:520px;margin:0 auto;width:100%}
.step-progress{padding:10px 14px;background:var(--white);border-bottom:1px solid var(--border)}
.progress-dots{display:flex;gap:3px;margin-bottom:5px}
.pdot{flex:1;height:4px;border-radius:2px;background:var(--border)}
.pdot.done{background:var(--brand-mid)}
.pdot.active{background:var(--brand)}
.step-label{font-size:11px;color:var(--text-muted)}
.step-body{padding:14px}
.sec-card{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:13px;margin-bottom:10px}
.sec-head{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding-bottom:9px;border-bottom:1px solid var(--border)}
.sec-head-icon{width:26px;height:26px;background:var(--brand-light);border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sec-head-icon svg{width:14px;height:14px}
.sec-head-title{font-size:13px;font-weight:700;color:var(--brand)}
.bloco-sep{font-size:12px;font-weight:700;color:var(--brand);text-transform:uppercase;letter-spacing:.4px;padding:7px 10px;background:var(--brand-light);border-radius:7px;margin:12px 0 10px}
.flabel{display:block;font-size:12px;color:var(--text-muted);margin-bottom:3px;font-weight:500}
.req{color:var(--brand)}
input[type=text].fi,input[type=date].fi,input[type=time].fi,input[type=number].fi,input[type=email].fi,select.fi{width:100%;padding:9px 10px;border:1px solid var(--border);border-radius:8px;font-size:14px;background:var(--white);color:var(--text);outline:none;-webkit-appearance:none;appearance:none}
input.fi:focus,select.fi:focus{border-color:var(--brand);box-shadow:0 0 0 2px rgba(192,57,43,.1)}
textarea.fi{width:100%;padding:9px 10px;border:1px solid var(--border);border-radius:8px;font-size:14px;resize:vertical;min-height:65px;background:var(--white);color:var(--text);outline:none}
textarea.fi:focus{border-color:var(--brand)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:10px}
.mb10{margin-bottom:10px}
.avaria-row{border:1px solid var(--border);border-radius:8px;padding:9px 11px;margin-bottom:7px}
.avaria-area{font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px}
.avaria-opcoes{display:flex;flex-wrap:wrap;gap:5px}
.av-btn{padding:4px 9px;border:1px solid var(--border);border-radius:14px;font-size:12px;cursor:pointer;background:transparent;color:var(--text-muted);transition:all .1s}
.av-btn.sel{background:var(--brand-light);border-color:var(--brand);color:var(--brand);font-weight:600}
.av-btn.sem.sel{background:#F0FDF4;border-color:#22C55E;color:#166534;font-weight:600}
.photo-zone{border:1px dashed var(--border);border-radius:9px;padding:11px;margin-bottom:10px}
.pz-label{font-size:12px;color:var(--text-muted);margin-bottom:7px;font-weight:500}
.photo-grid{display:flex;gap:7px;flex-wrap:wrap}
.photo-thumb{width:68px;height:68px;border-radius:7px;overflow:hidden;position:relative;border:1px solid var(--border)}
.photo-thumb img{width:100%;height:100%;object-fit:cover}
.photo-del{position:absolute;top:2px;right:2px;width:17px;height:17px;background:rgba(192,57,43,.9);border-radius:50%;border:none;color:white;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.photo-add-btn{width:68px;height:68px;border-radius:7px;border:1px dashed var(--border);background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;gap:3px;color:var(--text-muted)}
.photo-add-btn svg{width:19px;height:19px}
.photo-add-btn span{font-size:10px}
input[type=file]{display:none}
.sign-wrap{border:1px solid var(--border);border-radius:9px;background:var(--bg);position:relative;margin-top:5px}
canvas.sig{display:block;width:100%;height:120px;cursor:crosshair;touch-action:none;border-radius:9px}
.sig-line{position:absolute;bottom:26px;left:8%;right:8%;height:1px;background:var(--border);pointer-events:none}
.sig-hint{position:absolute;bottom:7px;left:50%;transform:translateX(-50%);font-size:10px;color:var(--text-muted);white-space:nowrap;pointer-events:none}
.btn-row{display:flex;gap:7px;margin-top:9px}
.btn-back{padding:10px 14px;border:1px solid var(--border);border-radius:8px;font-size:14px;cursor:pointer;background:var(--white);color:var(--text-muted)}
.btn-next{flex:1;padding:10px;background:var(--brand);color:white;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer}
.btn-clear{padding:5px 11px;border:1px solid var(--border);border-radius:7px;font-size:12px;cursor:pointer;background:var(--white);color:var(--text-muted);margin-top:5px}
.nivel-btns{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px}
.nv-btn{padding:5px 11px;border:1px solid var(--border);border-radius:18px;font-size:12px;cursor:pointer;background:transparent;color:var(--text);transition:all .1s}
.nv-btn.sel{background:var(--brand-light);border-color:var(--brand);color:var(--brand);font-weight:600}
.accept-box{display:flex;align-items:flex-start;gap:9px;padding:11px;background:var(--bg);border-radius:8px;margin-bottom:11px}
.accept-box input{width:16px;height:16px;flex-shrink:0;margin-top:1px;accent-color:var(--brand)}
.accept-box label{font-size:13px;color:var(--text-muted)}
.success-box{background:#FEF2F2;border:1px solid var(--brand-mid);border-radius:11px;padding:18px;text-align:center;margin-top:14px}
.success-box .ok-icon{width:42px;height:42px;background:var(--brand);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 9px}
.success-box h3{font-size:15px;font-weight:700;color:var(--brand);margin-bottom:4px}
.success-box p{font-size:13px;color:var(--brand-mid)}
#modalVistoria{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.5);padding:1rem;align-items:flex-start;justify-content:center;overflow-y:auto}
#modalVistoria.open{display:flex}
.modal-card{background:var(--white);border-radius:14px;width:100%;max-width:580px;margin:auto;overflow:hidden}
.modal-header{background:var(--brand);padding:14px 16px;display:flex;justify-content:space-between;align-items:center}
.modal-header h2{color:white;font-size:15px;font-weight:700}
.modal-close{background:none;border:none;color:white;font-size:22px;cursor:pointer}
.modal-body{padding:14px;overflow-y:auto;max-height:80vh}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:12px}
.detail-item label{font-size:11px;color:var(--text-muted);display:block}
.detail-item span{font-size:14px;font-weight:600}
.fotos-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:7px}
.fotos-grid img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:7px;border:1px solid var(--border)}
.item-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px}
.item-row:last-child{border:none}
/* Modal camera */
#cameraModal{display:none;position:fixed;inset:0;z-index:200;background:#000;flex-direction:column}
#cameraModal.open{display:flex}
#cameraVideo{width:100%;height:calc(100vh - 120px);object-fit:cover;flex-shrink:0}
.cam-bar{background:#111;height:120px;padding:0 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-shrink:0;position:relative}
.cam-bar-top{background:rgba(0,0,0,0.7);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:absolute;top:0;left:0;right:0;z-index:10}
.cam-capture{width:70px;height:70px;border-radius:50%;background:white;border:5px solid #ccc;cursor:pointer;flex-shrink:0;box-shadow:0 0 0 3px rgba(255,255,255,0.3)}
.cam-cancel{background:none;border:1px solid #888;color:white;padding:10px 18px;border-radius:8px;font-size:14px;cursor:pointer}
.cam-switch{background:none;border:1px solid #888;color:white;padding:10px 18px;border-radius:8px;font-size:14px;cursor:pointer}
#cameraCanvas{display:none}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1f2937;color:white;padding:10px 20px;border-radius:20px;font-size:13px;z-index:999;display:none;white-space:nowrap}
@media(max-width:400px){.stats-grid{grid-template-columns:1fr 1fr}.detail-grid{grid-template-columns:1fr}.row2{grid-template-columns:1fr}}
</style>
</head>

async function fazerLogin(){
  const email=document.getElementById('loginEmail').value.trim();
  const senha=document.getElementById('loginSenha').value;
  document.getElementById('loginErr').textContent='';
  document.getElementById('btnLogin').disabled=true;
  document.getElementById('btnLogin').textContent='Entrando...';
  const {data,error}=await sb.auth.signInWithPassword({email,password:senha});
  if(error){document.getElementById('loginErr').textContent='E-mail ou senha incorretos.';document.getElementById('btnLogin').disabled=false;document.getElementById('btnLogin').textContent='Entrar';return;}
  await initApp(data.user);
}
async function initApp(user){
  usuarioAtual=user;
  const {data}=await sb.from('usuarios').select('*').eq('email',user.email).single();
  perfilAtual=data;
  document.getElementById('authScreen').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('topSub').textContent=perfilAtual?.nome||user.email;
  document.getElementById('badgePerfil').textContent=perfilAtual?.perfil||'usuario';
  if(perfilAtual?.perfil==='vistoriador')document.getElementById('tabPainel').style.display='none';
  photos['cnh']=[];initFotos();renderStep();
}

// Restaurar estado ao voltar da camera no celular
document.addEventListener('visibilitychange', function(){
  if(document.visibilityState === 'visible'){
    const estadoOk = restaurarEstado();
    if(estadoOk){
      // Restaurar fotos do sessionStorage
      try{
        const saved=JSON.parse(sessionStorage.getItem('fotos_vistoria')||'{}');
        Object.keys(saved).forEach(secId=>{
          if(!photos[secId])photos[secId]=[];
          const existingUrls=photos[secId].map(p=>p.dataUrl);
          saved[secId].forEach(dataUrl=>{
            if(!existingUrls.includes(dataUrl)) photos[secId].push({file:null,dataUrl});
          });
        });
      }catch(ex){}
      renderStep();
    }
  }
});

sb.auth.getSession().then(({data:{session}})=>{if(!session){document.getElementById('authScreen').style.display='flex';document.getElementById('app').style.display='none';}});

function showTab(t){
  document.getElementById('checklistScreen').style.display=t==='checklist'?'block':'none';
  document.getElementById('painelScreen').style.display=t==='painel'?'block':'none';
  document.getElementById('tabChecklist').className='tab'+(t==='checklist'?' active':'');
  document.getElementById('tabPainel').className='tab'+(t==='painel'?' active':'');
  if(t==='painel')carregarPainel();
}

async function carregarPainel(){
  const {data:vis}=await sb.from('vw_vistorias_completas').select('*').order('criado_em',{ascending:false}).limit(50);
  if(!vis)return;
  const hoje=new Date();
  const mes=vis.filter(v=>{const d=new Date(v.data_vistoria);return d.getMonth()===hoje.getMonth()&&d.getFullYear()===hoje.getFullYear();});
  document.getElementById('stTotal').textContent=vis.length;
  document.getElementById('stMes').textContent=mes.length;
  document.getElementById('stAvarias').textContent=vis.filter(v=>v.total_nok>0).length;
  const tl={entrega:'Entrega',devolucao:'Devolucao',substituicao:'Substituicao'};
  document.getElementById('listaVistorias').innerHTML=vis.length?vis.map(v=>'<div class="vistoria-card" onclick="abrirModal(\''+v.id+'\')"><div class="vc-top"><span class="vc-codigo">'+v.codigo+' - '+(v.placa||'--')+'</span><span class="vc-status '+(v.status||'')+'">'+( v.status==='concluida'?'Concluida':'Em andamento')+'</span></div><div class="vc-info"><span>'+(tl[v.tipo]||v.tipo)+'</span><span>'+new Date(v.data_vistoria+'T12:00:00').toLocaleDateString('pt-BR')+'</span><span>'+(v.cliente_nome||'--')+'</span><span>'+(v.vistoriador_nome||'--')+'</span></div><div class="vc-badges"><span class="mini-badge">'+(v.total_fotos||0)+' foto(s)</span>'+(v.total_nok>0?'<span class="mini-badge avaria">'+v.total_nok+' avaria(s)</span>':'')+'</div></div>').join(''):'<div style="text-align:center;padding:2rem;color:var(--text-muted);font-size:13px">Nenhuma vistoria encontrada</div>';
}

async function abrirModal(id){

  const {data:itens}=await sb.from('itens_vistoria').select('*').eq('vistoria_id',id);
  const {data:fotos}=await sb.from('fotos_vistoria').select('*').eq('vistoria_id',id);
  document.getElementById('modalTitle').textContent=v.codigo+' - '+(v.placa||'Veiculo');
  const av=(itens||[]).filter(i=>i.status==='nok');
  document.getElementById('modalBody').innerHTML='<div class="detail-grid"><div class="detail-item"><label>Tipo</label><span>'+v.tipo+'</span></div><div class="detail-item"><label>Data</label><span>'+new Date(v.data_vistoria+'T12:00:00').toLocaleDateString('pt-BR')+'</span></div><div class="detail-item"><label>Placa</label><span>'+(v.placa||'--')+'</span></div><div class="detail-item"><label>KM</label><span>'+(v.km_atual||'--')+'</span></div><div class="detail-item"><label>Cliente</label><span>'+(v.cliente_nome||'--')+'</span></div><div class="detail-item"><label>Vistoriador</label><span>'+(v.vistoriador_nome||'--')+'</span></div></div>'+(av.length?'<div style="font-size:12px;font-weight:700;color:var(--brand);margin:10px 0 6px;text-transform:uppercase">Avarias ('+av.length+')</div><div>'+av.map(i=>'<div class="item-row"><span>'+i.categoria+' - '+i.item+'</span><span style="color:var(--brand);font-weight:600">'+i.observacao+'</span></div>').join('')+'</div>':'<div style="font-size:13px;color:var(--text-muted);margin:8px 0">Sem avarias registradas.</div>')+(fotos&&fotos.length?'<div style="font-size:12px;font-weight:700;color:var(--brand);margin:12px 0 6px;text-transform:uppercase">Fotos ('+fotos.length+')</div><div class="fotos-grid">'+fotos.map(f=>'<img src="'+(f.url_publica||'')+'" onerror="this.style.display=\'none\'" alt="foto"/>').join('')+'</div>':'')+(v.observacoes?'<div style="font-size:12px;font-weight:700;color:var(--brand);margin:12px 0 6px;text-transform:uppercase">Observacoes</div><div style="font-size:13px;background:var(--bg);padding:9px;border-radius:7px">'+v.observacoes+'</div>':'');

function fecharModal(){document.getElementById('modalVistoria').classList.remove('open');}

const stepTitles=['Identificacao','Avarias','Fotos','Assinatura'];
function renderStep(){
  const dots=document.querySelectorAll('.pdot');
  dots.forEach((d,i)=>{d.className='pdot'+(i<currentStep?' done':i===currentStep?' active':'');});
  document.getElementById('stepLabel').textContent='Passo '+(currentStep+1)+' de 4 - '+stepTitles[currentStep];
  const c=document.getElementById('stepContent');
  [renderStep0,renderStep1,renderStep2,renderStep3][currentStep](c);
}
function goStep(n){salvarEstado();currentStep=n;renderStep();window.scrollTo(0,0);}

function selNivel(btn,grpId,tipo,v){
  document.querySelectorAll('#'+grpId+' .nv-btn').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');
  if(tipo==='dev')nivelDev=v;else nivelEnt=v;
}

function nextStep0(){
  if(!getTipo()){showToast('Selecione o tipo de vistoria.');return;}
  const req=['f_data','f_cliente','f_cnh','f_placa','f_km'];
  let ok=true;
  req.forEach(id=>{const el=document.getElementById(id);if(el&&!el.value.trim()){el.style.borderColor='var(--brand)';ok=false;}else if(el)el.style.borderColor='';});
  if(isSubs()){['f_placa2','f_km2'].forEach(id=>{const el=document.getElementById(id);if(el&&!el.value.trim()){el.style.borderColor='var(--brand)';ok=false;}else if(el)el.style.borderColor='';});}
  if(!ok){showToast('Preencha os campos obrigatorios.');return;}
  goStep(1);
}

function setAvaria(btn,id,obj,v){
  btn.closest('.avaria-opcoes').querySelectorAll('.av-btn').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');
  window[obj][id]=v;
}

function initFotos(){[...FOTO_SECS_DEV,...FOTO_SECS_ENT,...FOTO_SECS_SIMPLES].forEach(s=>{if(!photos[s.id])photos[s.id]=[];});}

function restoreFotosFromSession(){
  try{
    const saved=JSON.parse(sessionStorage.getItem('fotos_vistoria')||'{}');
    Object.keys(saved).forEach(secId=>{
      if(!photos[secId])photos[secId]=[];
      // Restaurar apenas dataUrls que ainda nao estao em photos
      const existingUrls=photos[secId].map(p=>p.dataUrl);
      saved[secId].forEach(dataUrl=>{
        if(!existingUrls.includes(dataUrl)){
          photos[secId].push({file:null,dataUrl});
        }
      });
    });
  }catch(ex){}
}

function renderStep2(c){
  const tipo=getTipo();
  restoreFotosFromSession();
  const secs=tipo==='substituicao'?[...FOTO_SECS_DEV,...FOTO_SECS_ENT]:tipo==='devolucao'?FOTO_SECS_DEV:FOTO_SECS_SIMPLES;
  const html=secs.map(sec=>{
    const grid=(photos[sec.id]||[]).map((p,i)=>'<div class="photo-thumb"><img src="'+p.dataUrl+'"/><button class="photo-del" onclick="delFoto(\''+sec.id+'\','+i+')">x</button></div>').join('');
    return '<div class="photo-zone"><div class="pz-label">'+sec.label+(sec.req?' *':'')+'</div><div class="photo-grid" id="pg_'+sec.id+'">'+grid+'<div class="photo-add-btn" onclick="abrirCamera(\''+sec.id+'\',\''+sec.label+'\')"><svg viewBox="0 0 20 20" fill="none"><rect x="1" y="4" width="18" height="14" rx="2" stroke="currentColor" stroke-width="1.3"/><circle cx="10" cy="11" r="3" stroke="currentColor" stroke-width="1.3"/></svg><span>Foto</span></div></div></div>';
  }).join('');
  c.innerHTML='<div class="sec-card"><div class="sec-head"><div class="sec-head-icon"><svg viewBox="0 0 14 14" fill="none"><rect x="1" y="3" width="12" height="9" rx="1.5" stroke="#C0392B" stroke-width="1.2"/><circle cx="7" cy="7.5" r="2" stroke="#C0392B" stroke-width="1.2"/></svg></div><div class="sec-head-title">Fotos</div></div>'+html+'</div><div class="btn-row"><button class="btn-back" onclick="goStep(1)">Voltar</button><button class="btn-next" onclick="goStep(3)">Proximo - Assinatura</button></div>';
}

function addFotos(input,secId){
  Array.from(input.files).forEach(file=>{
    comprimirImagem(file,(blob,dataUrl)=>{
      if(!photos[secId])photos[secId]=[];
      photos[secId].push({file:blob, dataUrl});
      try{
        const saved=JSON.parse(sessionStorage.getItem('fotos_vistoria')||'{}');
        if(!saved[secId])saved[secId]=[];
        saved[secId].push(dataUrl);
        sessionStorage.setItem('fotos_vistoria',JSON.stringify(saved));
      }catch(ex){}
      salvarEstado();
      if(currentStep===2)renderStep();
    });
  });
  input.value='';
}
function delFoto(secId,idx){photos[secId].splice(idx,1);if(currentStep===2)renderStep();}

  setTimeout(()=>{setupSig('sigV','hasSigV');setupSig('sigC','hasSigC');},200);
}

function setupSig(cid,hk){
  const canvas=document.getElementById(cid);if(!canvas)return;
  const ctx=canvas.getContext('2d');let drawing=false;
  function resize(){const r=canvas.getBoundingClientRect(),dpr=window.devicePixelRatio||1;canvas.width=r.width*dpr;canvas.height=r.height*dpr;ctx.scale(dpr,dpr);ctx.strokeStyle='#C0392B';ctx.lineWidth=2;ctx.lineCap='round';ctx.lineJoin='round';}
  resize();
  function pos(e){const r=canvas.getBoundingClientRect(),s=e.touches?e.touches[0]:e;return{x:s.clientX-r.left,y:s.clientY-r.top};}
  canvas.addEventListener('mousedown',e=>{drawing=true;const p=pos(e);ctx.beginPath();ctx.moveTo(p.x,p.y);});
  canvas.addEventListener('mousemove',e=>{if(!drawing)return;window[hk]=true;const p=pos(e);ctx.lineTo(p.x,p.y);ctx.stroke();});
  canvas.addEventListener('mouseup',()=>drawing=false);
  canvas.addEventListener('touchstart',e=>{e.preventDefault();drawing=true;const p=pos(e);ctx.beginPath();ctx.moveTo(p.x,p.y);},{passive:false});
  canvas.addEventListener('touchmove',e=>{e.preventDefault();if(!drawing)return;window[hk]=true;const p=pos(e);ctx.lineTo(p.x,p.y);ctx.stroke();},{passive:false});
  canvas.addEventListener('touchend',()=>drawing=false);
}
function limparSig(cid,hk){const c=document.getElementById(cid);if(c)c.getContext('2d').clearRect(0,0,c.width,c.height);window[hk]=false;}

async function salvarVistoria(){
  if(!document.getElementById('aceite').checked){showToast('Marque a confirmacao.');return;}
  if(!window.hasSigV){showToast('Assinatura do vistoriador obrigatoria.');return;}
  if(!window.hasSigC){showToast('Assinatura do cliente obrigatoria.');return;}
  const btn=document.getElementById('btnSalvar');
  btn.disabled=true;btn.textContent='Salvando...';
  try{
    const placa=document.getElementById('f_placa').value.trim().toUpperCase();
    let veiculoId=null;
    const {data:vex}=await sb.from('veiculos').select('id').eq('placa',placa).single();
    if(vex){veiculoId=vex.id;}else{const {data:vn}=await sb.from('veiculos').insert({placa,modelo:document.getElementById('f_modelo')?.value||''}).select('id').single();veiculoId=vn?.id;}
    const nomeCliente=document.getElementById('f_cliente').value.trim();
    let clienteId=null;
    const {data:cex}=await sb.from('clientes').select('id').eq('nome',nomeCliente).single();
    if(cex){clienteId=cex.id;}else{const {data:cn}=await sb.from('clientes').insert({nome:nomeCliente,documento:document.getElementById('f_cnh').value,email:document.getElementById('f_emailCliente').value}).select('id').single();clienteId=cn?.id;}
    const sigVC=document.getElementById('sigV').toDataURL('image/png');
    const sigCC=document.getElementById('sigC').toDataURL('image/png');
    let obsTotal='';
    if(document.getElementById('obs_dev')?.value)obsTotal+='Devolucao: '+document.getElementById('obs_dev').value;
    if(document.getElementById('obs_ent')?.value)obsTotal+=(obsTotal?'\n':'')+'Entrega: '+document.getElementById('obs_ent').value;
    const {data:vis,error:visErr}=await sb.from('vistorias').insert({
      tipo:getTipo(),veiculo_id:veiculoId,cliente_id:clienteId,vistoriador_id:perfilAtual?.id,
      km_atual:parseInt(document.getElementById('f_km').value)||null,
      nivel_combustivel:nivelDev,numero_contrato:document.getElementById('f_contrato')?.value||'',
      observacoes:obsTotal,cidade_assinatura:document.getElementById('f_cidade').value,
      data_vistoria:document.getElementById('f_data').value,hora_vistoria:document.getElementById('f_hora').value,
      assinatura_vistoriador:sigVC,assinatura_cliente:sigCC,status:'concluida',finalizado_em:new Date().toISOString()
    }).select('id,codigo').single();
    if(visErr)throw visErr;
    const visId=vis.id;
    const itensPayload=[];
    if(isDev())AREAS_AVARIA.forEach((a,i)=>{const s=avariasDiv['dev_'+i];if(s&&s!=='Sem avaria')itensPayload.push({vistoria_id:visId,categoria:'Devolucao',item:a,status:'nok',observacao:s});});
    if(isEnt())AREAS_AVARIA.forEach((a,i)=>{const s=avariasEnt['ent_'+i];if(s&&s!=='Sem avaria')itensPayload.push({vistoria_id:visId,categoria:'Entrega',item:a,status:'nok',observacao:s});});
    if(itensPayload.length)await sb.from('itens_vistoria').insert(itensPayload);
    let totalFotos=0;
    const allSecs=[...FOTO_SECS_DEV,...FOTO_SECS_ENT,...FOTO_SECS_SIMPLES];
    for(const sec of allSecs){for(const p of(photos[sec.id]||[])){const path='vistorias/'+visId+'/'+sec.id+'_'+Date.now()+'.jpg';const {data:upData}=await sb.storage.from('Fotos - Vistorias').upload(path,p.file,{contentType:'image/jpeg',upsert:true});if(upData){const {data:url}=sb.storage.from('Fotos - Vistorias').getPublicUrl(path);await sb.from('fotos_vistoria').insert({vistoria_id:visId,secao:sec.id,nome_arquivo:path,url_publica:url?.publicUrl,tamanho_bytes:p.file.size});totalFotos++;}}}
    document.getElementById('successBox').innerHTML='<div class="success-box"><div class="ok-icon"><svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M4 11l5 5 9-9" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div><h3>Vistoria salva!</h3><p>ID: <strong>'+vis.codigo+'</strong> | '+totalFotos+' foto(s)<br>Email enviado para '+EMAIL_EMPRESA+'</p></div>';
    btn.style.display='none';limparEstado();
    setTimeout(()=>{Object.keys(avariasDiv).forEach(k=>delete avariasDiv[k]);Object.keys(avariasEnt).forEach(k=>delete avariasEnt[k]);photos={};initFotos();nivelDev='Cheio';nivelEnt='Cheio';currentStep=0;renderStep();},6000);
  }catch(e){console.error(e);showToast('Erro ao salvar. Tente novamente.');btn.disabled=false;btn.textContent='Finalizar e salvar vistoria';}
}


function addFotoCnh(input){
  const file = input.files[0];
  if(!file) return;
  comprimirImagem(file,(blob,dataUrl)=>{
    photos['cnh'] = [{file:blob, dataUrl}];
    try{
      const saved=JSON.parse(sessionStorage.getItem('fotos_vistoria')||'{}');
      saved['cnh']=[dataUrl];
      sessionStorage.setItem('fotos_vistoria',JSON.stringify(saved));
    }catch(ex){}
    salvarEstado();
    renderCnhGrid(dataUrl);
  });
  input.value='';
}
function renderCnhGrid(dataUrl){
  const grid = document.getElementById('pg_cnh');
  if(!grid)return;
  const addBtn = document.getElementById('addCnhBtn');
  const inp = document.getElementById('fi_cnh');
  grid.innerHTML = '';
  const thumb = document.createElement('div');
  thumb.className = 'photo-thumb';
  thumb.innerHTML = '<img src="'+dataUrl+'"/><button class="photo-del" onclick="delFotoCnh()">x</button>';
  grid.appendChild(thumb);
  grid.appendChild(addBtn);
  grid.appendChild(inp);
}
function delFotoCnh(){
  photos['cnh']=[];
  const grid=document.getElementById('pg_cnh');
  if(!grid)return;
  const addBtn=document.getElementById('addCnhBtn');
  const inp=document.getElementById('fi_cnh');
  grid.innerHTML='';
  grid.appendChild(addBtn);
  grid.appendChild(inp);
}


// ============================================================
// PERSISTENCIA DE ESTADO — evita perda de dados no celular
// ============================================================
function salvarEstado(){
  try{
    const estado={
      step: currentStep,
      nivelDev, nivelEnt,
      avariasDiv: JSON.parse(JSON.stringify(avariasDiv)),
      avariasEnt: JSON.parse(JSON.stringify(avariasEnt)),
      campos:{
        f_tipo: document.getElementById('f_tipo')?.value||'',
        f_data: document.getElementById('f_data')?.value||'',
        f_hora: document.getElementById('f_hora')?.value||'',
        f_cliente: document.getElementById('f_cliente')?.value||'',
        f_cnh: document.getElementById('f_cnh')?.value||'',
        f_contrato: document.getElementById('f_contrato')?.value||'',
        f_emailCliente: document.getElementById('f_emailCliente')?.value||'',
        f_placa: document.getElementById('f_placa')?.value||'',
        f_km: document.getElementById('f_km')?.value||'',
        f_modelo: document.getElementById('f_modelo')?.value||'',
        f_placa2: document.getElementById('f_placa2')?.value||'',
        f_km2: document.getElementById('f_km2')?.value||'',
        f_modelo2: document.getElementById('f_modelo2')?.value||'',
      }
    };
    sessionStorage.setItem('vistoria_estado', JSON.stringify(estado));
  }catch(ex){console.log('erro ao salvar estado',ex);}
}

function restaurarEstado(){
  try{
    const raw = sessionStorage.getItem('vistoria_estado');
    if(!raw) return false;
    const estado = JSON.parse(raw);
    // Restaurar avarias
    Object.assign(avariasDiv, estado.avariasDiv||{});
    Object.assign(avariasEnt, estado.avariasEnt||{});
    nivelDev = estado.nivelDev||'Cheio';
    nivelEnt = estado.nivelEnt||'Cheio';
    // Restaurar campos após render
    setTimeout(()=>{
      Object.keys(estado.campos||{}).forEach(id=>{
        const el=document.getElementById(id);
        if(el&&estado.campos[id])el.value=estado.campos[id];
      });
      // Restaurar nível combustível visual
      document.querySelectorAll('#nivelDevBtns .nv-btn').forEach(b=>{b.classList.remove('sel');if(b.textContent===nivelDev)b.classList.add('sel');});
      document.querySelectorAll('#nivelEntBtns .nv-btn').forEach(b=>{b.classList.remove('sel');if(b.textContent===nivelEnt)b.classList.add('sel');});
    },100);
    return true;
  }catch(ex){return false;}
}

function limparEstado(){
  sessionStorage.removeItem('vistoria_estado');
  sessionStorage.removeItem('fotos_vistoria');
}

// Comprimir imagem antes de salvar (reduz de 3MB para ~200KB)
function comprimirImagem(file, callback){
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const MAX = 1200;
      let w=img.width, h=img.height;
      if(w>h){if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}}
      else{if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}}
      canvas.width=w; canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      canvas.toBlob(blob=>callback(blob, canvas.toDataURL('image/jpeg',0.75)),'image/jpeg',0.75);
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}


// ============================================================
// CAMERA MODAL — evita reload da pagina no celular
// ============================================================
let cameraStream=null, cameraFacing='environment', cameraTarget=null, cameraSecId=null;

async function abrirCamera(secId, label){
  cameraSecId = secId;
  cameraTarget = secId;
  document.getElementById('btnCapturar').onclick = capturarFoto;
  document.getElementById('cameraModal').classList.add('open');
  await iniciarCamera();
}

async function iniciarCamera(){
  try{
    if(cameraStream){cameraStream.getTracks().forEach(t=>t.stop());}
    cameraStream = await navigator.mediaDevices.getUserMedia({
      video:{facingMode: cameraFacing, width:{ideal:1280}, height:{ideal:720}},
      audio:false
    });
    document.getElementById('cameraVideo').srcObject = cameraStream;
  }catch(e){
    // Se nao tiver camera, cair para input file
    fecharCamera();
    document.getElementById('fi_'+cameraSecId)?.click();
  }
}

async function alternarCamera(){
  cameraFacing = cameraFacing==='environment'?'user':'environment';
  await iniciarCamera();
}

function capturarFoto(){
  const video = document.getElementById('cameraVideo');
  const canvas = document.getElementById('cameraCanvas');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video,0,0);
  canvas.toBlob(blob=>{
    const dataUrl = canvas.toDataURL('image/jpeg',0.75);
    if(!photos[cameraSecId]) photos[cameraSecId]=[];
    photos[cameraSecId].push({file:blob, dataUrl});
    // Salvar no sessionStorage
    try{
      const saved=JSON.parse(sessionStorage.getItem('fotos_vistoria')||'{}');
      if(!saved[cameraSecId])saved[cameraSecId]=[];
      saved[cameraSecId].push(dataUrl);
      sessionStorage.setItem('fotos_vistoria',JSON.stringify(saved));
    }catch(ex){}
    salvarEstado();
    fecharCamera();
    if(currentStep===2) renderStep();
  },'image/jpeg',0.75);
}

function capturarFotoCnh(){
  const video = document.getElementById('cameraVideo');
  const canvas = document.getElementById('cameraCanvas');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video,0,0);
  canvas.toBlob(blob=>{
    const dataUrl = canvas.toDataURL('image/jpeg',0.75);
    photos['cnh'] = [{file:blob, dataUrl}];
    try{
      const saved=JSON.parse(sessionStorage.getItem('fotos_vistoria')||'{}');
      saved['cnh']=[dataUrl];
      sessionStorage.setItem('fotos_vistoria',JSON.stringify(saved));
    }catch(ex){}
    salvarEstado();
    fecharCamera();
    renderCnhGrid(dataUrl);
  },'image/jpeg',0.75);
}

function fecharCamera(){
  if(cameraStream){cameraStream.getTracks().forEach(t=>t.stop());cameraStream=null;}
  document.getElementById('cameraModal').classList.remove('open');
}

async function abrirCameraCnh(){
  cameraSecId='cnh';
  document.getElementById('btnCapturar').onclick = capturarFotoCnh;
  document.getElementById('cameraModal').classList.add('open');
  await iniciarCamera();
}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';setTimeout(()=>t.style.display='none',2500);}
</script>
